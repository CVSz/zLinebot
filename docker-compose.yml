version: "3.9"

services:
  app:
    build: ./app
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
      - kafka
    environment:
      AUTOMATION_WORKER_MODE: external

  admin:
    build: ./admin
    restart: always

  worker:
    build: ./app
    restart: always
    env_file: .env
    command: ["npm", "run", "worker"]
    deploy:
      replicas: 3
    environment:
      AUTOMATION_WORKER_MODE: external
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant

  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama

  zookeeper:
    image: bitnami/zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"

  kafka:
    image: bitnami/kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"


  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"

  metabase:
    image: metabase/metabase
    ports:
      - "3001:3000"
    depends_on:
      - clickhouse

  flink-jobmanager:
    image: flink:1.18
    command: jobmanager
    ports:
      - "8081:8081"

  flink-taskmanager:
    image: flink:1.18
    command: taskmanager
    depends_on:
      - flink-jobmanager
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - app
      - admin

  cloudflared:
    image: cloudflare/cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared

volumes:
  pg:
  ollama:
