version: "3.9"

services:
  app:
    build: ./app
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama

  admin:
    build: ./admin
    restart: always

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  qdrant:
    image: qdrant/qdrant

  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - app
      - admin

  cloudflared:
    image: cloudflare/cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared

volumes:
  pg:
  ollama:
