name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FLY_REGISTRY: registry.fly.io/zlinebot

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t zlinebot .

      - name: Log in to Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: zeazdev
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Push
        run: |
          docker tag zlinebot "$FLY_REGISTRY:latest"
          docker push "$FLY_REGISTRY:latest"
