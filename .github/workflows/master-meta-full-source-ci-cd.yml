name: Master Meta Full Source CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python lint tools
        run: python -m pip install --upgrade pip ruff

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run master meta full-source CI
        run: ./scripts/master_meta_full_source_ci_cd.sh ci

  cd:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.FLY_API_TOKEN != ''
    needs: ci
    runs-on: ubuntu-latest
    env:
      FLY_REGISTRY: registry.fly.io/zlinebot
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for deploy
        run: docker build -t zlinebot:ci .

      - name: Publish image to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: ./scripts/master_meta_full_source_ci_cd.sh cd
