apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: zlinebot
spec:
  replicas: 5
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: zlinebot-worker:latest
          envFrom:
            - secretRef:
                name: zlinebot-secret
